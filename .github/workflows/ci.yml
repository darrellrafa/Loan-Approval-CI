name: Model Training CI

# Workflow ini akan berjalan otomatis setiap kali ada 'push' ke branch 'main'
on:
  push:
    branches:
      - main

jobs:
  train-and-save:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn mlflow

    - name: Train Model (MLflow Run)
      run: |
        # Menjalankan MLProject menggunakan environment lokal runner
        mlflow run . --env-manager=local

    - name: Upload Model Artifacts ke GitHub
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: mlruns/